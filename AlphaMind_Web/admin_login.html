<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>AlphaMind 管理员登录</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root{--brand:#8B0012;--accent:#FFA726;--bg:#FFF8F2;--text:#2C1A12;--border:#E7D9CD;--muted:rgba(44,26,18,.72);--shadow:0 10px 30px rgba(0,0,0,.06);--radius:18px;}
    *{box-sizing:border-box}
    body{margin:0;font-family:"Microsoft YaHei",-apple-system,BlinkMacSystemFont,system-ui,sans-serif;background:radial-gradient(1200px 600px at 20% -10%, rgba(255,167,38,.18), transparent 60%),radial-gradient(900px 500px at 90% 0%, rgba(139,0,18,.12), transparent 55%),var(--bg);color:var(--text);}
    .page{max-width:560px;margin:0 auto;padding:26px 16px 44px}
    .topbar{display:flex;align-items:center;gap:14px;padding:14px;border:1px solid var(--border);border-radius:var(--radius);background:rgba(255,255,255,.7);box-shadow:var(--shadow);backdrop-filter:blur(10px);}
    .logo{width:48px;height:48px}
    .brand h1{margin:0;font-size:18px;color:var(--brand)}
    .brand p{margin:4px 0 0;font-size:12px;color:var(--muted)}
    .card{margin-top:16px;background:rgba(255,255,255,.88);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px;}
    label{font-size:13px}
    input{width:100%;padding:10px 12px;border-radius:14px;border:1px solid #d9cabc;background:#fff;outline:none;font-size:13px;}
    input:focus{border-color:rgba(255,167,38,.85);box-shadow:0 0 0 3px rgba(255,167,38,.22);}
    .row{margin:10px 0}
    .actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px;align-items:center}
    .btn{border:none;border-radius:999px;padding:10px 16px;cursor:pointer;font-weight:950;font-size:13px;display:inline-flex;align-items:center;gap:8px;}
    .btn-primary{background:var(--brand);color:#fff}
    .btn-primary:hover{background:var(--accent);color:#23140e}
    .btn-ghost{background:transparent;border:1px dashed var(--border);color:var(--text);text-decoration:none}
    .hint{font-size:12px;color:var(--muted);line-height:1.5}
  </style>
</head>
<body>
  <div class="page">
    <header class="topbar">
      <img class="logo" src="alphamind_logo.png" alt="AlphaMind Logo" />
      <div class="brand">
        <h1>管理员登录</h1>
        <p>仅管理员可查看问卷结果</p>
      </div>
    </header>

    <div class="card">
      <div class="row">
        <label>账号</label>
        <input id="u" type="text" placeholder="请输入账号" />
      </div>
      <div class="row">
        <label>密码</label>
        <input id="p" type="password" placeholder="请输入密码" />
      </div>

      <div class="actions">
        <button class="btn btn-primary" onclick="login()">登录</button>
        <a class="btn btn-ghost" href="survey.html">返回问卷</a>
        <a class="btn btn-ghost" href="result.html">返回结果页</a>
      </div>

      <div class="hint" style="margin-top:12px">
        提示：当前为前端演示版登录。若部署到公网，请改为后端鉴权（避免账号被从源码中读取）。
      </div>
    </div>
  </div>

  <script>
    const ADMIN_USER = "alphamind001";
    const ADMIN_PASS = "dafengqixiyunfeiyang";
    const TOKEN_KEY = "alphamind_admin_token_v1";

    function login(){
      const u = (document.getElementById("u").value||"").trim();
      const p = (document.getElementById("p").value||"").trim();
      if(u === ADMIN_USER && p === ADMIN_PASS){
        sessionStorage.setItem(TOKEN_KEY, "1");
        window.location.href = "admin_dashboard.html";
      }else{
        alert("账号或密码错误");
      }
    }
  </script>
</body>
</html>
